# Render Blueprint — deploys all 4 services from one file
# Usage: Dashboard → New → Blueprint → connect repo → done

databases:
  - name: maps-postgres
    plan: free
    databaseName: route_toll_db
    postgresMajorVersion: "16"

services:
  # ── Redis ──
  - type: redis
    name: maps-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []          # only internal access

  # ── Backend API ──
  - type: web
    name: maps-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: MAPBOX_ACCESS_TOKEN
        sync: false              # set manually in dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: maps-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: maps-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://maps-frontend.onrender.com   # update after deploy

  # ── Frontend Static Site ──
  - type: web
    name: maps-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=86400
    envVars:
      - key: REACT_APP_API_URL
        value: https://maps-backend.onrender.com/api   # update after deploy
      - key: REACT_APP_MAPBOX_TOKEN
        sync: false              # set manually in dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
